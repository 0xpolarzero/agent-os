name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check-types
      - run: pnpm build
      # Keep CI on the stable smoke path until the broader monorepo test suite
      # is split away from environment-specific and known-broken packages.
      - run: pnpm --filter @rivet-dev/agent-os-playground test
